{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 mt-5">
        <div class="card shadow p-4 border-0">
            <h2 class="text-center mb-4 fw-bold">Create Your Account</h2>
            
            <form action="{{ url_for('register') }}" method="POST">
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Create a unique username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
                    <div class="form-text mt-2">
                        Your password will be encrypted using SHA-256 for security.
                    </div>
                </div>
                
                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow-sm">
                    Create Account
                </button>
            </form>

            <hr class="my-4">
            
            <p class="text-center mb-0">
                Already have an account? 
                <a href="{{ url_for('login') }}" class="text-danger fw-bold text-decoration-none">
                    Login here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
