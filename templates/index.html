<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">🎯 My Job Tracker</h1>

        <!-- Add Job Form -->
        <div class="card p-4 mb-4">
            <h5>Add a Job</h5>
            <form action="/add" method="POST">
                <div class="mb-2">
                    <input type="text" name="company" placeholder="Company name" class="form-control" required>
                </div>
                <div class="mb-2">
                    <input type="text" name="role" placeholder="Job title" class="form-control" required>
                </div>
                <div class="mb-2">
                    <select name="status" class="form-control">
                        <option>Applied</option>
                        <option>Interview</option>
                        <option>Offer</option>
                        <option>Rejected</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-danger">Add Job</button>
            </form>
        </div>

        <!-- Job List -->
        <h5>Applications ({{ jobs|length }} total)</h5>
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for job in jobs %}
                <tr>
                    <td><strong>{{ job.company }}</strong></td>
                    <td>{{ job.role }}</td>
                    <td>{{ job.status }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center">No jobs added yet</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</body>
</html>
